name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  commit-prefix:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: Validate commit prefixes

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate commit subjects
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          echo "Checking commit subjects in range: $BASE_SHA..$HEAD_SHA"
          COMMITS=$(git log --format=%s "$BASE_SHA..$HEAD_SHA")

          if [ -z "$COMMITS" ]; then
            echo "No commits found in PR range. Skipping."
            exit 0
          fi

          echo "Commit subjects:"
          echo "$COMMITS"

          INVALID=$(echo "$COMMITS" | grep -Ev '^\[(fix|feat|major)\]' || true)
          if [ -n "$INVALID" ]; then
            echo "The following commit subjects are invalid:"
            echo "$INVALID"
            echo "Each commit subject must start with one of: [fix], [feat], [major]"
            exit 1
          fi

          echo "All commit subjects use valid prefixes."

  typecheck:
    runs-on: ubuntu-latest
    name: TypeScript Typecheck

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npx tsc --noEmit

  build:
    runs-on: ubuntu-latest
    name: Build TypeScript

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify dist output
        run: test -f dist/yacaBridge.js

  validate-config:
    runs-on: ubuntu-latest
    name: Validate config.json

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Validate config.json syntax
        run: node -e "JSON.parse(require('fs').readFileSync('config.json','utf-8')); console.log('config.json is valid');"
