name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    name: TypeScript Typecheck

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npx tsc --noEmit

  build:
    runs-on: ubuntu-latest
    name: Build TypeScript

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify dist output
        run: test -f dist/yacaBridge.js

  validate-config:
    runs-on: ubuntu-latest
    name: Validate config.json

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Validate config.json syntax
        run: node -e "JSON.parse(require('fs').readFileSync('config.json','utf-8')); console.log('config.json is valid');"
